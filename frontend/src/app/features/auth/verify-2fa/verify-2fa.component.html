<div class="min-h-screen flex items-center justify-center px-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold tracking-tight text-red-500">Neo4flix</h1>
      <p class="mt-2 text-gray-400">Two-factor authentication</p>
    </div>

    <div class="bg-gray-900 rounded-2xl shadow-2xl shadow-black/50 p-8 border border-gray-800">
      <p class="text-sm text-gray-400 mb-6 text-center">
        Enter the 6-digit code from your authenticator app.
      </p>

      @if (errorMessage()) {
        <div class="mb-4 p-3 rounded-lg bg-red-500/10 border border-red-500/20 text-red-400 text-sm">
          {{ errorMessage() }}
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <input
            type="text"
            formControlName="code"
            maxlength="6"
            class="w-full text-center text-2xl tracking-[0.5em] rounded-lg border-gray-700 bg-gray-800 text-gray-100 placeholder-gray-500 focus:border-red-500 focus:ring-red-500/20 transition-colors font-mono py-4"
            placeholder="000000"
            autocomplete="one-time-code"
          />
        </div>

        <button
          type="submit"
          [disabled]="form.invalid || isLoading()"
          class="w-full py-2.5 px-4 rounded-lg bg-red-600 hover:bg-red-500 disabled:bg-gray-700 disabled:text-gray-500 text-white font-medium transition-colors duration-200 cursor-pointer disabled:cursor-not-allowed"
        >
          {{ isLoading() ? 'Verifying...' : 'Verify' }}
        </button>
      </form>

      <p class="mt-6 text-center text-sm text-gray-400">
        <a routerLink="/login" class="text-red-400 hover:text-red-300 font-medium transition-colors">Back to login</a>
      </p>
    </div>
  </div>
</div>
